{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stalwart.fullname" . }}-metrics
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "stalwart.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 8080
      targetPort: http
      protocol: TCP
{{- end }}
