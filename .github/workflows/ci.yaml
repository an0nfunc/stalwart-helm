name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint chart/stalwart

      - name: Helm template (defaults)
        run: helm template stalwart chart/stalwart

      - name: Helm template (examples)
        run: |
          for f in examples/*.yaml; do
            echo "--- Templating with $f ---"
            helm template stalwart chart/stalwart -f "$f"
          done

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate templates
        run: |
          helm template stalwart chart/stalwart | kubeconform -strict -ignore-missing-schemas
          for f in examples/*.yaml; do
            echo "--- Validating with $f ---"
            helm template stalwart chart/stalwart -f "$f" | kubeconform -strict -ignore-missing-schemas
          done

  release:
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package chart/stalwart

      - name: Push to OCI registry
        run: helm push stalwart-*.tgz oci://ghcr.io/an0nfunc/stalwart-helm/chart

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: stalwart-*.tgz
